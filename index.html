<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=840, height=344" />
  <title>tr('Twitch Stream Status')</title>

  <link rel="icon" type="image/svg+xml" href="resources/icon.svg" />

  <!-- iCUE user-configurable properties -->
  <meta name="x-icue-property" content="clientId"
        data-label="tr('Twitch Client ID')"
        data-type="textfield"
        data-default="''" />

  <meta name="x-icue-property" content="clientSecret"
        data-label="tr('Twitch Client Secret')"
        data-type="textfield"
        data-default="''" />

  <meta name="x-icue-property" content="channelName"
        data-label="tr('Channel Name')"
        data-type="textfield"
        data-default="'giantwaffle'" />

  <meta name="x-icue-property" content="refreshInterval"
        data-label="tr('Refresh Interval (seconds)')"
        data-type="textfield"
        data-default="'60'" />

  <meta name="x-icue-property" content="accentColor"
        data-label="tr('Accent Color')"
        data-type="color"
        data-default="'#9146FF'" />

  <meta name="x-icue-property" content="textColor"
        data-label="tr('Text Color')"
        data-type="color"
        data-default="'#FFFFFF'" />

  <meta name="x-icue-property" content="backgroundColor"
        data-label="tr('Background Color')"
        data-type="color"
        data-default="'#0A0A0F'" />

  <script type="application/json" id="x-icue-groups">
    [
      {
        "title": "tr('Twitch API')",
        "properties": ["clientId", "clientSecret", "channelName", "refreshInterval"]
      },
      {
        "title": "tr('Appearance')",
        "properties": ["textColor", "accentColor", "backgroundColor"]
      }
    ]
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: #0A0A0F;
      color: #FFFFFF;
      display: flex;
      align-items: stretch;
    }

    /* Grid texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LEFT PANEL ─────────────────────────────────────────── */
    .panel-left {
      position: relative;
      z-index: 1;
      width: 365px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px 24px 18px 24px;
      border-right: 1px solid #1e2230;
    }

    .channel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .channel-meta {
      min-width: 0;
    }

    .platform-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #555870;
      margin-bottom: 5px;
    }

    .channel-name {
      font-size: 36px;
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #FFFFFF;
      word-break: break-all;
    }

    .twitch-logo {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      margin-top: 2px;
      opacity: 0.6;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 3px;
      border: 1px solid #1e2230;
      background: #0e1018;
      transition: all 0.5s ease;
    }

    .status-badge.is-live {
      border-color: rgba(255, 45, 45, 0.5);
      background: rgba(255, 45, 45, 0.1);
    }

    .status-badge.is-loading {
      border-color: #1e2230;
      background: #0e1018;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3a4050;
      flex-shrink: 0;
      transition: background 0.5s ease;
    }

    .dot.live {
      background: #ff2d2d;
      animation: pulse 2s ease-in-out infinite;
    }

    .dot.loading {
      background: #555870;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 45, 45, 0.6); }
      50%       { box-shadow: 0 0 0 6px rgba(255, 45, 45, 0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Footer of left panel */
    .left-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .refresh-info {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555870;
    }

    .clock {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #555870;
    }

    /* ── RIGHT PANEL ────────────────────────────────────────── */
    .panel-right {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 18px 22px 18px 22px;
      gap: 10px;
    }

    /* Info rows — horizontal 2-col grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      flex: 1;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      padding: 10px 14px;
      background: #0e1018;
      border: 1px solid #1e2230;
      border-radius: 3px;
      min-width: 0;
    }

    /* Viewers spans full width */
    .info-row.viewers-row {
      grid-column: 1 / -1;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
    }

    .info-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555870;
    }

    .info-value {
      font-size: 15px;
      font-weight: 400;
      color: #FFFFFF;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }

    .info-value.viewers {
      font-size: 26px;
      font-weight: 700;
      color: #9146FF;
      line-height: 1;
    }

    /* ── UPTIME SECTION ─────────────────────────────────────── */
    .uptime-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 14px;
      background: #0e1018;
      border: 1px solid #1e2230;
      border-radius: 3px;
    }

    .ring-wrap { flex-shrink: 0; }

    .ring-bg  { fill: none; stroke: #1e2230; stroke-width: 4; }
    .ring-arc {
      fill: none;
      stroke: #ff2d2d;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 175.93;
      stroke-dashoffset: 175.93;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.5s ease;
    }

    .uptime-info {}
    .uptime-value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 2px;
    }

    .uptime-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555870;
    }

    /* ── CONFIG WARNING ─────────────────────────────────────── */
    .config-warn {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
    }

    .config-warn svg {
      width: 36px;
      height: 36px;
      opacity: 0.4;
    }

    .config-warn p {
      font-size: 12px;
      color: #555870;
      letter-spacing: 0.05em;
      line-height: 1.6;
      max-width: 340px;
    }

    .config-warn strong {
      color: #FFFFFF;
    }
    /* ── Larger, bolder base text (all sizes) ───────────────── */
    .channel-name   { font-size: 38px; font-weight: 900; }
    .status-text    { font-size: 18px; font-weight: 800; }
    .clock          { font-size: 22px; font-weight: 800; }
    .platform-label { font-size: 13px; font-weight: 600; }
    .refresh-info   { font-size: 15px; font-weight: 600; }
    .info-label     { font-size: 13px; font-weight: 700; }
    .info-value     { font-size: 17px; font-weight: 700; }
    .info-value.viewers { font-size: 30px; font-weight: 900; }
    .uptime-value   { font-size: 30px; font-weight: 900; }
    .uptime-label   { font-size: 10px; font-weight: 700; }

    /* ── RIGHT PANEL — hidden at small ─────────────────────── */
    .panel-extra {
      display: none;
    }

    /* ── MEDIUM  1680×344  — JS adds class="size-md" to body ── */
    body.size-md .panel-left,
    body.size-lg .panel-left {
      width: 360px;
      padding: 22px 28px 20px 28px;
    }
    body.size-md .channel-name,
    body.size-lg .channel-name   { font-size: 52px; }
    body.size-md .twitch-logo,
    body.size-lg .twitch-logo    { width: 34px; height: 34px; }
    body.size-md .status-badge,
    body.size-lg .status-badge   { padding: 10px 18px; }
    body.size-md .dot,
    body.size-lg .dot            { width: 11px; height: 11px; }
    body.size-md .status-text,
    body.size-lg .status-text    { font-size: 15px; }
    body.size-md .clock,
    body.size-lg .clock          { font-size: 28px; }

    body.size-md .panel-right,
    body.size-lg .panel-right    { border-right: 1px solid #1e2230; }

    /* Info: 3-row stack instead of 2-col grid */
    body.size-md .info-grid,
    body.size-lg .info-grid {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    body.size-md .info-row.viewers-row,
    body.size-lg .info-row.viewers-row {
      flex-direction: column;
      align-items: flex-start;
      grid-column: unset;
    }
    body.size-md .info-row,
    body.size-lg .info-row       { flex: 1; }
    body.size-md .info-value,
    body.size-lg .info-value         { font-size: 18px; }
    body.size-md .info-value.viewers,
    body.size-lg .info-value.viewers { font-size: 40px; }
    body.size-md .info-label,
    body.size-lg .info-label         { font-size: 11px; }

    /* Uptime moves to right extra panel */
    body.size-md #uptime-row,
    body.size-lg #uptime-row { display: none; }

    body.size-md .panel-extra,
    body.size-lg .panel-extra {
      display: flex;
      position: relative;
      z-index: 1;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      width: 280px;
      padding: 20px 26px;
      gap: 16px;
      border-left: 1px solid #1e2230;
    }
    body.size-md .panel-extra .uptime-value,
    body.size-lg .panel-extra .uptime-value { font-size: 44px; }
    body.size-md .panel-extra .uptime-label,
    body.size-lg .panel-extra .uptime-label { font-size: 11px; text-align: center; }

    /* ── LARGE  1680×688  — JS adds class="size-lg" to body ─── */
    body.size-lg .panel-left {
      width: 480px;
      padding: 36px 40px 32px 40px;
    }
    body.size-lg .channel-name   { font-size: 80px; }
    body.size-lg .twitch-logo    { width: 48px; height: 48px; }
    body.size-lg .status-badge   { padding: 14px 24px; gap: 12px; }
    body.size-lg .dot            { width: 13px; height: 13px; }
    body.size-lg .status-text    { font-size: 18px; }
    body.size-lg .clock          { font-size: 42px; }

    body.size-lg .panel-right    { padding: 36px 38px; gap: 14px; }
    body.size-lg .info-grid      { gap: 10px; }
    body.size-lg .info-value         { font-size: 24px; }
    body.size-lg .info-value.viewers { font-size: 60px; }
    body.size-lg .info-label         { font-size: 13px; }

    body.size-lg .panel-extra    { width: 420px; padding: 36px 38px; gap: 24px; }
    body.size-lg .panel-extra .uptime-value { font-size: 68px; }
    body.size-lg .panel-extra .uptime-label { font-size: 13px; }
  </style>
</head>
<body>

<!-- ── LEFT PANEL ─────────────────────────────── -->
<div class="panel-left">

  <div class="channel-header">
    <div class="channel-meta">
      <div class="platform-label">Twitch · Live Status</div><br><br>
      <div class="channel-name" id="display-channel">—</div>
    </div>
    <svg class="twitch-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path fill="#9146FF" d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
    </svg>
  </div>

  <div class="status-wrap">
    <div class="status-badge is-loading" id="status-badge">
      <div class="dot loading" id="dot"></div>
      <div class="status-text" id="status-text" style="color:#555870;">LOADING</div>
    </div>
  </div>

  <div class="left-footer">
    <div class="refresh-info" id="refresh-info">—</div>
  </div>

</div>

<!-- ── RIGHT PANEL ────────────────────────────── -->
<div class="panel-right">

  <!-- Config warning (shown when credentials missing) -->
  <div class="config-warn" id="config-warn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
    </svg>
    <p>Enter your <strong>Twitch Client ID</strong> and <strong>Client Secret</strong> in the iCUE widget settings panel to get started.</p>
  </div>

  <!-- Main content -->
  <div id="main-content" style="display:flex; flex-direction:column; gap:10px; flex:1;">

    <div class="info-grid" id="info-grid">
      <div class="info-row">
        <div class="info-label">Stream Title</div>
        <div class="info-value" id="val-title">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">Category</div>
        <div class="info-value" id="val-game">—</div>
      </div>
      <div class="info-row viewers-row">
        <div>
          <div class="info-label">Viewers</div>
          <div class="info-value viewers" id="val-viewers">—</div>
        </div>
      </div>
    </div>

    <div class="uptime-row" id="uptime-row">
      <div class="ring-wrap">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle class="ring-bg" cx="28" cy="28" r="28"/>
          <circle class="ring-arc" id="ring-arc" cx="28" cy="28" r="28"/>
        </svg>
      </div>
      <div class="uptime-info">
        <div class="uptime-value" id="uptime-val">—</div>
        <div class="uptime-label">Stream uptime</div>
      </div>
    </div>

  </div>
</div>

<!-- ── EXTRA PANEL (medium + large only) ──────── -->
<div class="panel-extra">
  <div class="ring-wrap" id="ring-wrap-extra"></div>
  <div class="uptime-info" style="text-align:center;">
    <div class="uptime-value" id="uptime-val-extra">—</div>
    <div class="uptime-label">Stream uptime</div>
  </div>
</div>

<script>
  // ── iCUE event hooks ───────────────────────────────────────────────
  icueEvents = {
    onICUEInitialized: onInit,
    onDataUpdated: onDataUpdated,
  };

  function onInit() {
    applyTheme();
    startWidget();
  }

  function onDataUpdated() {
    applyTheme();
    startWidget();
  }

  if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) {
    onInit();
  }

  // ── Theme application ──────────────────────────────────────────────
  function applyTheme() {
    document.body.style.background = backgroundColor || '#0A0A0F';
    document.body.style.color      = textColor       || '#FFFFFF';
    document.getElementById('display-channel').style.color = textColor || '#FFFFFF';
    document.getElementById('val-viewers').style.color     = accentColor || '#9146FF';
    document.getElementById('ring-arc').style.stroke       = accentColor || '#9146FF';
    document.getElementById('dot').style.background        = accentColor || '#9146FF';
  }

  // ── Widget state ───────────────────────────────────────────────────
  let refreshTimer    = null;
  let countdownTimer  = null;
  let countdown       = 60;
  let startedAtCache  = null;

  function startWidget() {
    if (refreshTimer)   clearInterval(refreshTimer);
    if (countdownTimer) clearInterval(countdownTimer);

    const channel = (channelName  || '').trim();
    const id      = (clientId     || '').trim();
    const secret  = (clientSecret || '').trim();

    document.getElementById('display-channel').textContent =
      channel ? channel.toUpperCase() : '—';

    if (!id || !secret || !channel) {
      showConfigWarning(true);
      return;
    }

    showConfigWarning(false);

    const interval = Math.max(30, parseInt(refreshInterval, 10) || 60);
    countdown = interval;

    fetchStatus();

    refreshTimer = setInterval(fetchStatus, interval * 1000);
    countdownTimer = setInterval(() => {
      countdown--;
      if (countdown <= 0) countdown = interval;
      document.getElementById('refresh-info').textContent =
        'Refreshing in ' + countdown + 's';
    }, 1000);
  }

  function showConfigWarning(show) {
    document.getElementById('config-warn').style.display    = show ? 'flex' : 'none';
    document.getElementById('main-content').style.display   = show ? 'none' : 'flex';
  }

  // ── Twitch API ─────────────────────────────────────────────────────
  async function getToken() {
    const res = await fetch('https://id.twitch.tv/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'client_id=' + encodeURIComponent(clientId.trim()) +
            '&client_secret=' + encodeURIComponent(clientSecret.trim()) +
            '&grant_type=client_credentials'
    });
    if (!res.ok) throw new Error('Token request failed: ' + res.status);
    const data = await res.json();
    return data.access_token;
  }

  async function fetchStatus() {
    try {
      const token = await getToken();
      const res = await fetch(
        'https://api.twitch.tv/helix/streams?user_login=' +
          encodeURIComponent(channelName.trim()),
        {
          headers: {
            'Client-ID': clientId.trim(),
            'Authorization': 'Bearer ' + token
          }
        }
      );
      if (!res.ok) throw new Error('Streams request failed: ' + res.status);
      const data = await res.json();
      render(data.data && data.data.length > 0 ? data.data[0] : null);
    } catch (e) {
      renderError(e.message);
    }
  }

  // ── Render ─────────────────────────────────────────────────────────
  function render(stream) {
    const badge      = document.getElementById('status-badge');
    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');

    if (stream) {
      badge.className = 'status-badge is-live';
      dot.className   = 'dot live';
      dot.style.background = '#ff2d2d';
      statusText.textContent = 'LIVE';
      statusText.style.color = '#ff2d2d';

      document.getElementById('val-title').textContent   = stream.title    || '—';
      document.getElementById('val-game').textContent    = stream.game_name || '—';
      document.getElementById('val-viewers').textContent = Number(stream.viewer_count).toLocaleString();

      startedAtCache = stream.started_at;
      updateUptime();

    } else {
      badge.className = 'status-badge';
      dot.className   = 'dot';
      dot.style.background = '#3a4050';
      statusText.textContent = 'OFFLINE';
      statusText.style.color = '#555870';

      document.getElementById('val-title').textContent   = '—';
      document.getElementById('val-game').textContent    = '—';
      document.getElementById('val-viewers').textContent = '—';
      document.getElementById('uptime-val').textContent  = '—';
      document.getElementById('ring-arc').style.strokeDashoffset = '175.93';

      startedAtCache = null;
    }
  }

  function renderError(msg) {
    const statusText = document.getElementById('status-text');
    document.getElementById('status-badge').className = 'status-badge';
    document.getElementById('dot').className = 'dot';
    document.getElementById('dot').style.background = '#ff8c00';
    statusText.textContent = 'ERROR';
    statusText.style.color = '#ff8c00';
    document.getElementById('val-title').textContent = msg || 'Unknown error';
    document.getElementById('val-game').textContent  = '—';
    document.getElementById('val-viewers').textContent = '—';
  }

  function updateUptime() {
    if (!startedAtCache) return;
    const mins    = Math.floor((Date.now() - new Date(startedAtCache)) / 60000);
    const h       = Math.floor(mins / 60);
    const m       = mins % 60;
    const display = h > 0
      ? h + 'h ' + String(m).padStart(2, '0') + 'm'
      : m + 'm';

    document.getElementById('uptime-val').textContent = display;

    // Ring fills up over 6 hours (360 mins)
    // New ring r=28 → circumference = 2π×28 ≈ 175.93
    const circumference = 175.93;
    const progress = Math.min(mins / 360, 1);
    document.getElementById('ring-arc').style.strokeDashoffset =
      (circumference * (1 - progress)).toFixed(2);
  }

  setInterval(() => { if (startedAtCache) updateUptime(); }, 60000);

  // ── Clock ──────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0');
  }

  updateClock();
  setInterval(updateClock, 1000);

  // ── Responsive size class ──────────────────────────────────────
  // Adds size-md or size-lg to <body> so CSS rules activate.
  function applySize() {
    var w = window.innerWidth, h = window.innerHeight;
    document.body.classList.remove('size-md', 'size-lg');
    if      (w >= 1680 && h >= 688) document.body.classList.add('size-lg');
    else if (w >= 1680)             document.body.classList.add('size-md');
    buildExtraRing();
  }

  // ── Extra-panel uptime ring ────────────────────────────────────
  var _extraCirc = 251.33; // r=40 default

  function buildExtraRing() {
    var w = window.innerWidth, h = window.innerHeight;
    var r      = (w >= 1680 && h >= 688) ? 60 : 40;
    var size   = r === 60 ? 120 : 80;
    var stroke = r === 60 ? 6   : 5;
    _extraCirc = +(2 * Math.PI * r).toFixed(2);
    var cx   = size / 2;
    var wrap = document.getElementById('ring-wrap-extra');
    if (!wrap) return;
    wrap.innerHTML = '';
    var ns  = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size); svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);
    var bg = document.createElementNS(ns, 'circle');
    bg.setAttribute('class', 'ring-bg'); bg.setAttribute('cx', cx);
    bg.setAttribute('cy', cx); bg.setAttribute('r', r);
    bg.setAttribute('stroke-width', stroke);
    var arc = document.createElementNS(ns, 'circle');
    arc.setAttribute('id', 'ring-arc-extra'); arc.setAttribute('class', 'ring-arc');
    arc.setAttribute('cx', cx); arc.setAttribute('cy', cx); arc.setAttribute('r', r);
    arc.setAttribute('stroke-width', stroke);
    arc.style.strokeDasharray  = _extraCirc;
    arc.style.strokeDashoffset = _extraCirc;
    arc.style.stroke = (typeof accentColor !== 'undefined' && accentColor) ? accentColor : '#9146FF';
    svg.appendChild(bg); svg.appendChild(arc); wrap.appendChild(svg);
    // Sync uptime progress if stream already running
    if (startedAtCache) syncExtraUptime();
  }

  function syncExtraUptime() {
    if (!startedAtCache) return;
    var mins    = Math.floor((Date.now() - new Date(startedAtCache)) / 60000);
    var h       = Math.floor(mins / 60), m = mins % 60;
    var display = h > 0 ? h + 'h ' + String(m).padStart(2,'0') + 'm' : m + 'm';
    var vx = document.getElementById('uptime-val-extra');
    if (vx) vx.textContent = display;
    var ax = document.getElementById('ring-arc-extra');
    if (ax) ax.style.strokeDashoffset =
      (_extraCirc * (1 - Math.min(mins / 360, 1))).toFixed(2);
  }

  // Keep extra panel in sync every minute alongside the main uptime
  setInterval(syncExtraUptime, 60000);

  // Also sync whenever the main ring updates
  var _origUpdateUptime = updateUptime;
  updateUptime = function() { _origUpdateUptime(); syncExtraUptime(); };

  // Also sync extra val when render() sets offline state
  var _origRender = render;
  render = function(stream) {
    _origRender(stream);
    if (!stream) {
      var vx = document.getElementById('uptime-val-extra');
      if (vx) vx.textContent = '—';
      var ax = document.getElementById('ring-arc-extra');
      if (ax) ax.style.strokeDashoffset = _extraCirc.toFixed(2);
    }
  };

  applySize();
  window.addEventListener('resize', applySize);
</script>
